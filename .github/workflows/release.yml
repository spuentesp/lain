name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        id: version
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu
      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu
      - name: Package
        run: mkdir -p release && cp target/x86_64-unknown-linux-gnu/release/lain release/lain-${{ steps.version.outputs.VERSION }}-x86_64-unknown-linux-gnu
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        id: version
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: aarch64-apple-darwin
      - name: Build
        run: cargo build --release --target aarch64-apple-darwin
      - name: Package
        run: mkdir -p release && cp target/aarch64-apple-darwin/release/lain release/lain-${{ steps.version.outputs.VERSION }}-aarch64-apple-darwin
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        id: version
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc
      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc
      - name: Package
        shell: bash
        run: mkdir -p release && cp target/x86_64-pc-windows-msvc/release/lain.exe release/lain-${{ steps.version.outputs.VERSION }}-x86_64-pc-windows-msvc.exe
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  
  publish-server-json:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos-arm64, build-windows]
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        id: version
      - name: Update server.json version
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" server.json
      - uses: softprops/action-gh-release@v2
        with:
          files: server.json
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}